DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noha Web</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Nastaliq Urdu', serif; }
        .urdu { direction: rtl; }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">

    <!-- Header -->
    <div class="bg-gray-800 p-4 shadow-lg">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold text-amber-400 urdu">نوہا ویب</h1>
            <button id="loginBtn" class="bg-amber-500 hover:bg-amber-600 px-4 py-2 rounded-lg font-semibold">
                Admin Login
            </button>
            <button id="logoutBtn" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg font-semibold hidden">
                Logout
            </button>
        </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto p-4">
        
        <!-- Admin Upload Form - Sirf login ke baad dikhega -->
        <div id="adminPanel" class="bg-gray-800 p-6 rounded-lg mb-6 hidden">
            <h2 class="text-2xl mb-4 text-amber-400 urdu">نیا نوحہ شامل کریں</h2>
            <input id="nohaTitle" type="text" placeholder="نوحہ کا عنوان" 
                   class="w-full p-3 mb-3 bg-gray-700 rounded-lg urdu text-right" dir="rtl">
            <textarea id="nohaLyrics" placeholder="نوحہ کے اشعار..." rows="8"
                      class="w-full p-3 mb-3 bg-gray-700 rounded-lg urdu text-right" dir="rtl"></textarea>
            <input id="nohaNauhaKhan" type="text" placeholder="نوحہ خواں کا نام" 
                   class="w-full p-3 mb-3 bg-gray-700 rounded-lg urdu text-right" dir="rtl">
            <button id="addNohaBtn" class="bg-green-600 hover:bg-green-700 px-6 py-3 rounded-lg font-semibold w-full">
                نوحہ شامل کریں
            </button>
        </div>

        <!-- Noha List -->
        <div id="nohaList" class="space-y-4">
            <p class="text-center text-gray-400">Loading nohe...</p>
        </div>

    </div>

    <!-- Login Modal -->
    <div id="loginModal" class="fixed inset-0 bg-black bg-opacity-70 flex items-center justify-center hidden">
        <div class="bg-gray-800 p-6 rounded-lg w-96">
            <h2 class="text-2xl mb-4 text-amber-400">Admin Login</h2>
            <input id="emailInput" type="email" placeholder="Email" 
                   class="w-full p-3 mb-3 bg-gray-700 rounded-lg">
            <input id="passwordInput" type="password" placeholder="Password" 
                   class="w-full p-3 mb-3 bg-gray-700 rounded-lg">
            <button id="submitLoginBtn" class="bg-amber-500 hover:bg-amber-600 px-6 py-3 rounded-lg font-semibold w-full mb-2">
                Login
            </button>
            <button id="closeLoginBtn" class="bg-gray-600 hover:bg-gray-700 px-6 py-2 rounded-lg w-full">
                Cancel
            </button>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';

        
        const firebaseConfig = {
            // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyBWiXNaoonFbRc-TGC7DFj3UYhd-w1GbPE",
  authDomain: "noha-web-ce1cf.firebaseapp.com",
  databaseURL: "https://noha-web-ce1cf-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "noha-web-ce1cf",
  storageBucket: "noha-web-ce1cf.firebasestorage.app",
  messagingSenderId: "455134935899",
  appId: "1:455134935899:web:0126a0db4cfb9c2f87387e"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Elements
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const loginModal = document.getElementById('loginModal');
        const adminPanel = document.getElementById('adminPanel');
        const nohaList = document.getElementById('nohaList');

        // Auth State Change
        onAuthStateChanged(auth, (user) => {
            if (user) {
                loginBtn.classList.add('hidden');
                logoutBtn.classList.remove('hidden');
                adminPanel.classList.remove('hidden');
            } else {
                loginBtn.classList.remove('hidden');
                logoutBtn.classList.add('hidden');
                adminPanel.classList.add('hidden');
            }
        });

        // Login Modal
        loginBtn.onclick = () => loginModal.classList.remove('hidden');
        document.getElementById('closeLoginBtn').onclick = () => loginModal.classList.add('hidden');

        // Login
        document.getElementById('submitLoginBtn').onclick = async () => {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                loginModal.classList.add('hidden');
            } catch (error) {
                alert('Login failed: ' + error.message);
            }
        };

        // Logout
        logoutBtn.onclick = () => signOut(auth);

        // Add Noha
        document.getElementById('addNohaBtn').onclick = async () => {
            const title = document.getElementById('nohaTitle').value;
            const lyrics = document.getElementById('nohaLyrics').value;
            const nauhaKhan = document.getElementById('nohaNauhaKhan').value;
            
            if (!title || !lyrics) {
                alert('Title aur Lyrics zaroori hai');
                return;
            }

            try {
                await addDoc(collection(db, 'nohas'), {
                    title: title,
                    lyrics: lyrics,
                    nauhaKhan: nauhaKhan,
                    createdAt: new Date()
                });
                document.getElementById('nohaTitle').value = '';
                document.getElementById('nohaLyrics').value = '';
                document.getElementById('nohaNauhaKhan').value = '';
                alert('Noha add ho gaya!');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        };

        // Load Nohas Real-time
        const q = query(collection(db, 'nohas'), orderBy('createdAt', 'desc'));
        onSnapshot(q, (snapshot) => {
            nohaList.innerHTML = '';
            if (snapshot.empty) {
                nohaList.innerHTML = '<p class="text-center text-gray-400 urdu">ابھی کوئی نوحہ موجود نہیں</p>';
                return;
            }
            snapshot.forEach((docSnap) => {
                const noha = docSnap.data();
                const div = document.createElement('div');
                div.className = 'bg-gray-800 p-6 rounded-lg';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <h3 class="text-2xl text-amber-400 urdu">${noha.title}</h3>
                        ${auth.currentUser ? `<button onclick="deleteNoha('${docSnap.id}')" class="bg-red-600 hover:bg-red-700 px-3 py-1 rounded text-sm">Delete</button>` : ''}
                    </div>
                    <p class="text-gray-300 whitespace-pre-line mb-3 urdu text-lg leading-loose">${noha.lyrics}</p>
                    ${noha.nauhaKhan ? `<p class="text-amber-500 urdu">نوحہ خواں: ${noha.nauhaKhan}</p>` : ''}
                `;
                nohaList.appendChild(div);
            });
        });

        // Delete Noha
        window.deleteNoha = async (id) => {
            if (confirm('Is nohe ko delete karna hai?')) {
                await deleteDoc(doc(db, 'nohas', id));
            }
        };
    </script>

</body>
  </html>
